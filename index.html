<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>The Masterpiece Mansion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#235f62;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Helvetica Neue',sans-serif;}

#stage{position:relative;width:100vw;max-width:478px;}
#stage svg{width:100%;height:auto;display:block;}

/* 空き室：#666161（SVGデフォルト）、入居者：黄色 */
.win-occupied{fill:#f5c842 !important;}
.win-hover{fill:#f5d442 !important;cursor:pointer;}

/* モーダル */
#overlay{display:none;position:fixed;inset:0;z-index:100;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);}
#overlay.open{display:flex;}
#mbox{background:#fff;border-radius:16px;width:min(520px,94vw);max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,0.4);}
#mhead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid #eee;flex-shrink:0;}
#mhead-left{display:flex;align-items:center;gap:12px;}
#mhead-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;background:#e8e8e8;flex-shrink:0;}
#mtitle{font-size:15px;font-weight:700;color:#111;}
#msub{font-size:11px;color:#888;margin-top:2px;}
#mclose{width:30px;height:30px;border-radius:50%;border:1px solid #ddd;background:#f5f5f5;cursor:pointer;font-size:14px;color:#555;display:flex;align-items:center;justify-content:center;}
#mclose:hover{background:#eee;}
#mbody{overflow-y:auto;padding:18px;}
.cs{margin-bottom:18px;}
.csh{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.bio{font-size:13px;color:#333;line-height:1.7;}
.tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{background:#f0f0f0;color:#555;font-size:12px;padding:3px 10px;border-radius:20px;}
.links{display:flex;flex-direction:column;gap:7px;}
.lnk{display:flex;align-items:center;gap:9px;padding:9px 13px;background:#f8f8f8;border-radius:8px;text-decoration:none;color:#333;font-size:13px;}
.lnk:hover{background:#eee;}
.lnk-i{font-size:15px;width:18px;text-align:center;}

/* LIVE バッジ */
#live-badge{display:none;position:fixed;top:16px;right:16px;background:#f5c842;color:#191818;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;z-index:200;}

/* 新入居通知 */
#new-notice{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#f5c842;color:#191818;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.3);}
</style>
</head>
<body>

<div id="stage"></div>

<div id="overlay">
  <div id="mbox">
    <div id="mhead">
      <div id="mhead-left">
        <img id="mhead-avatar" src="" alt="">
        <div>
          <div id="mtitle"></div>
          <div id="msub"></div>
        </div>
      </div>
      <button id="mclose">✕</button>
    </div>
    <div id="mbody">
      <div id="creator-content"></div>
    </div>
  </div>
</div>

<div id="live-badge">● LIVE（5秒更新）</div>
<div id="new-notice">✨ 新しいクリエイターが入居しました！</div>

<script>
(function(){

var GAS_URL   = 'https://script.google.com/macros/s/AKfycbyarPw5dG4T5RQNOrrOdwUGDcA6m397ElSFfI_N4otvassWHDllUn_YcRV1FT3XhjF7Ng/exec';
var GAS_TOKEN = 'mpm-secret-2026';
var roomData  = {};
var firstLoad = true;

// SVGをfetchして埋め込む
fetch('mansion_new.svg')
  .then(function(r){ return r.text(); })
  .then(function(svgText){
    document.getElementById('stage').innerHTML = svgText;
    initWindows();
    startPolling();
  });

function initWindows(){
  var wins = document.querySelectorAll('[id^="win-"]');
  wins.forEach(function(el){
    el.style.cursor = 'default';
    el.addEventListener('mouseenter', function(){
      if(el.classList.contains('win-occupied')) el.classList.add('win-hover');
    });
    el.addEventListener('mouseleave', function(){
      el.classList.remove('win-hover');
    });
    el.addEventListener('click', function(){
      if(el.classList.contains('win-occupied')){
        var roomNum = el.id.replace('win-', '');
        openModal(roomNum);
      }
    });
  });
}

function applyOccupancy(){
  var wins = document.querySelectorAll('[id^="win-"]');
  wins.forEach(function(el){
    var roomNum = el.id.replace('win-', '');
    // 側面窓はスキップ（後で処理）
    if(roomNum.indexOf('side') !== -1) return;
    if(roomData[roomNum]){
      el.classList.add('win-occupied');
      el.style.cursor = 'pointer';
    } else {
      el.classList.remove('win-occupied');
      el.style.cursor = 'default';
    }
  });

  // 側面窓：x01部屋に入居者がいれば同じ階の側面も黄色に
  for(var floor = 1; floor <= 9; floor++){
    var roomNum = String(floor * 100 + 1); // 101, 201, ...901
    var occupied = !!roomData[roomNum];
    var sideA = document.getElementById('win-side-A-' + floor);
    var sideB = document.getElementById('win-side-B-' + floor);
    if(sideA){ if(occupied){ sideA.classList.add('win-occupied'); } else { sideA.classList.remove('win-occupied'); } }
    if(sideB){ if(occupied){ sideB.classList.add('win-occupied'); } else { sideB.classList.remove('win-occupied'); } }
  }
}

function loadRoomData(){
  fetch(GAS_URL + '?token=' + GAS_TOKEN)
    .then(function(r){ return r.json(); })
    .then(function(rows){
      var newData = {};
      rows.forEach(function(row){
        var n = String(row['部屋番号']||'').trim();
        if(n) newData[n] = row;
      });
      var hasNew = !firstLoad && Object.keys(newData).some(function(n){ return !roomData[n]; });
      roomData = newData;
      firstLoad = false;
      applyOccupancy();
      if(hasNew) showNotice();
    })
    .catch(function(){ applyOccupancy(); });
}

function showNotice(){
  var el = document.getElementById('new-notice');
  el.style.display = 'block';
  el.style.opacity = '1';
  setTimeout(function(){
    el.style.transition = 'opacity 1.5s';
    el.style.opacity = '0';
    setTimeout(function(){ el.style.display='none'; el.style.transition=''; }, 1600);
  }, 3000);
}

var isLive = window.location.search.indexOf('live=true') !== -1;
var POLL   = isLive ? 5000 : 300000;

function startPolling(){
  loadRoomData();
  setInterval(loadRoomData, POLL);
  if(isLive) document.getElementById('live-badge').style.display = 'block';
}

// モーダル
function toDriveImg(url, sz){
  if(!url) return '';
  var m = url.match(/\/file\/d\/([^\/]+)/);
  if(m) return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w'+sz;
  var m2 = url.match(/[?&]id=([^&]+)/);
  if(m2) return 'https://drive.google.com/thumbnail?id='+m2[1]+'&sz=w'+sz;
  return url;
}

function initAvatar(name){
  var el = document.getElementById('mhead-avatar');
  var cv = document.createElement('canvas'); cv.width=96; cv.height=96;
  var ctx = cv.getContext('2d');
  ctx.fillStyle='#e0e8f0'; ctx.beginPath(); ctx.arc(48,48,48,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#5577aa'; ctx.font='bold 36px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText((name||'?').charAt(0), 48, 50);
  el.src = cv.toDataURL(); el.style.display='block';
}

function openModal(roomNum){
  var cr = roomData[roomNum] || null;
  var floor = Math.floor(parseInt(roomNum)/100);
  var unit  = parseInt(roomNum) % 100;
  var tier  = floor < 4 ? '低層' : floor < 7 ? '中層' : '高層';
  var name  = cr ? (cr['氏名']||'') : '';

  var av = document.getElementById('mhead-avatar');
  if(cr && cr['作品画像']){
    av.src = toDriveImg(cr['作品画像'], 200);
    av.style.display = 'block';
    av.onerror = function(){ av.style.display='none'; if(name) initAvatar(name); };
  } else {
    av.style.display='none';
    if(name) initAvatar(name);
  }

  document.getElementById('mtitle').textContent = cr ? (cr['氏名']||'名前未設定') : floor+'階 '+unit+'号室';
  document.getElementById('msub').textContent   = (cr&&cr['所属'] ? cr['所属']+' · ' : '') + tier+'階 · '+roomNum+'号室';

  var h = '';
  if(cr){
    if(cr['タグ']){
      h += '<div class="cs"><div class="csh">専門分野</div><div class="tags">';
      cr['タグ'].split(',').forEach(function(t){ h += '<span class="tag">'+t.trim()+'</span>'; });
      h += '</div></div>';
    }
    if(cr['自己紹介']){
      h += '<div class="cs"><div class="csh">自己紹介</div><p class="bio">'+cr['自己紹介']+'</p></div>';
    }
    var ls = [];
    if(cr['WEBサイト'])      ls.push({i:'🌐', l:'WEBサイト',   u: cr['WEBサイト']});
    if(cr['SNS：Instagram']) ls.push({i:'📷', l:'Instagram',    u: 'https://instagram.com/'+cr['SNS：Instagram'].replace('@','')});
    if(cr['SNS：Twitter'])   ls.push({i:'🐦', l:'Twitter / X', u: 'https://twitter.com/'+cr['SNS：Twitter'].replace('@','')});
    if(cr['SNS：other'])     ls.push({i:'🔗', l:'その他SNS',   u: cr['SNS：other']});
    if(cr['URL'])            ls.push({i:'🎨', l:'作品URL',      u: cr['URL']});
    if(ls.length){
      h += '<div class="cs"><div class="csh">リンク</div><div class="links">';
      ls.forEach(function(lk){ h += '<a class="lnk" href="'+lk.u+'" target="_blank" rel="noopener"><span class="lnk-i">'+lk.i+'</span>'+lk.l+'</a>'; });
      h += '</div></div>';
    }
  } else {
    h = '<div style="text-align:center;padding:40px;color:#aaa"><div style="font-size:48px;margin-bottom:12px">🚪</div><p>現在入居者募集中</p></div>';
  }
  document.getElementById('creator-content').innerHTML = h;
  document.getElementById('overlay').classList.add('open');
}

document.getElementById('mclose').addEventListener('click', function(){ document.getElementById('overlay').classList.remove('open'); });
document.getElementById('overlay').addEventListener('click', function(e){ if(e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('open'); });
document.addEventListener('keydown', function(e){ if(e.key==='Escape') document.getElementById('overlay').classList.remove('open'); });

})();
</script>
</body>
</html>
